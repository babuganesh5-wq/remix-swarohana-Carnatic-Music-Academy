<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" fill="none">
  <defs>
    <!-- Background and base card gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#020203" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121216" />
      <stop offset="100%" stop-color="#08080a" />
    </linearGradient>
    <linearGradient id="chart-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="chart-area-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05" />
    </linearGradient>
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main dark background canvas -->
  <rect width="1000" height="600" rx="16" fill="url(#bg-grad)" />
  <rect width="998" height="598" x="1" y="1" rx="15" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />

  <!-- Side Navigation Rail -->
  <g id="sidebar" opacity="0.85">
    <rect width="70" height="600" rx="16" fill="#08080a" opacity="0.5" />
    <!-- Sidebar Logo -->
    <circle cx="35" cy="40" r="14" fill="#1e293b" />
    <path d="M 31 38 L 35 34 L 39 38 L 35 46 Z" stroke="#3b82f6" stroke-width="1.5" />
    <circle cx="35" cy="34" r="2" fill="#ffffff" />
    
    <!-- Navigation Icons (Mocked) -->
    <rect x="25" y="100" width="20" height="20" rx="4" fill="#3b82f6" opacity="0.9" /> <!-- Active -->
    <rect x="25" y="150" width="20" height="20" rx="4" stroke="#475569" stroke-width="1.5" />
    <rect x="25" y="200" width="20" height="20" rx="4" stroke="#475569" stroke-width="1.5" />
    <rect x="25" y="250" width="20" height="20" rx="4" stroke="#475569" stroke-width="1.5" />
    <rect x="25" y="300" width="20" height="20" rx="4" stroke="#475569" stroke-width="1.5" />
    
    <!-- Bottom User profile in sidebar -->
    <circle cx="35" cy="550" r="12" fill="#475569" />
  </g>

  <!-- Top Navigation Header -->
  <g id="header">
    <text x="100" y="45" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="-0.5">Overview</text>
    <text x="200" y="45" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#64748b">Real-time Metrics</text>
    <text x="360" y="45" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#64748b">Campaigns</text>
    
    <!-- Top badge -->
    <rect x="800" y="25" width="130" height="30" rx="15" fill="url(#badge-grad)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="815" cy="40" r="4" fill="#10b981" />
    <text x="826" y="44" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#3b82f6">Corewave Connected</text>
  </g>

  <!-- BENTO GRID SYSTEM -->

  <!-- Card 1: Primary Metrics (Top Left Big Metric) -->
  <g id="card-metric-1">
    <rect x="100" y="80" width="260" height="110" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="120" y="115" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">TOTAL ANNUAL RECURRING REVENUE</text>
    <text x="120" y="155" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">$1,482,920</text>
    <!-- Trend badge -->
    <rect x="270" y="132" width="70" height="22" rx="11" fill="#10b981" fill-opacity="0.1" />
    <text x="282" y="146" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#10b981">▲ +24.8%</text>
  </g>

  <!-- Card 2: Secondary Metrics (Top Center Metric) -->
  <g id="card-metric-2">
    <rect x="380" y="80" width="260" height="110" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="400" y="115" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">ACTIVE SUBSCRIBERS</text>
    <text x="400" y="155" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">84,291</text>
    <!-- Trend badge -->
    <rect x="550" y="132" width="70" height="22" rx="11" fill="#3b82f6" fill-opacity="0.1" />
    <text x="562" y="146" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">▲ +12.5%</text>
  </g>

  <!-- Card 3: Third Metric (Top Right Metric) -->
  <g id="card-metric-3">
    <rect x="660" y="80" width="270" height="110" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="680" y="115" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">CONVERSION RATE</text>
    <text x="680" y="155" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">3.82%</text>
    <!-- Trend badge -->
    <rect x="830" y="132" width="70" height="22" rx="11" fill="#10b981" fill-opacity="0.1" />
    <text x="842" y="146" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#10b981">▲ +4.2%</text>
  </g>

  <!-- Large Graph Card (Middle Block) -->
  <g id="card-chart">
    <rect x="100" y="210" width="540" height="240" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="120" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Performance Index</text>
    <text x="120" y="265" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#64748b">Real-time request loads &amp; server response latencies</text>
    
    <!-- Chart Legend -->
    <circle cx="530" cy="241" r="4" fill="#3b82f6" />
    <text x="540" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">API Response</text>

    <!-- Grid Lines -->
    <line x1="120" y1="290" x2="610" y2="290" stroke="#1e293b" stroke-dasharray="2 4" />
    <line x1="120" y1="330" x2="610" y2="330" stroke="#1e293b" stroke-dasharray="2 4" />
    <line x1="120" y1="370" x2="610" y2="370" stroke="#1e293b" stroke-dasharray="2 4" />
    <line x1="120" y1="410" x2="610" y2="410" stroke="#1e293b" stroke-dasharray="2 4" />

    <!-- X-Axis Labels -->
    <text x="120" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">08:00 AM</text>
    <text x="218" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">10:00 AM</text>
    <text x="316" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">12:00 PM</text>
    <text x="414" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">02:00 PM</text>
    <text x="512" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">04:00 PM</text>
    <text x="610" y="432" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569">06:00 PM</text>

    <!-- Chart Wave Form area gradient fill -->
    <path d="M 120 410 C 170 380, 200 320, 240 330 C 280 340, 320 390, 360 350 C 400 310, 440 250, 480 260 C 520 270, 560 320, 610 290 L 610 410 Z" fill="url(#chart-area-grad)" />

    <!-- Chart Wave Form Glow Line -->
    <path d="M 120 410 C 170 380, 200 320, 240 330 C 280 340, 320 390, 360 350 C 400 310, 440 250, 480 260 C 520 270, 560 320, 610 290" stroke="url(#chart-line-grad)" stroke-width="3" stroke-linecap="round" filter="url(#neon-glow)" />
    
    <!-- Interactive Highlight Node -->
    <circle cx="480" cy="260" r="5" fill="#ffffff" />
    <circle cx="480" cy="260" r="10" stroke="#06b6d4" stroke-width="2" opacity="0.6" filter="url(#neon-glow)" />
  </g>

  <!-- Right Distribution Panel (Middle Right block) -->
  <g id="card-channels">
    <rect x="660" y="210" width="270" height="240" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="680" y="245" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Traffic Origin</text>
    
    <!-- Distribution list items -->
    <!-- Item 1 -->
    <text x="680" y="285" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Direct Access</text>
    <rect x="680" y="294" width="230" height="6" rx="3" fill="#1e293b" />
    <rect x="680" y="294" width="140" height="6" rx="3" fill="#3b82f6" />
    <text x="880" y="285" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">58%</text>

    <!-- Item 2 -->
    <text x="680" y="335" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Social Media</text>
    <rect x="680" y="344" width="230" height="6" rx="3" fill="#1e293b" />
    <rect x="680" y="344" width="80" height="6" rx="3" fill="#06b6d4" />
    <text x="880" y="335" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">26%</text>

    <!-- Item 3 -->
    <text x="680" y="385" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Organic Search</text>
    <rect x="680" y="394" width="230" height="6" rx="3" fill="#1e293b" />
    <rect x="680" y="394" width="50" height="6" rx="3" fill="#10b981" />
    <text x="880" y="385" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">16%</text>
  </g>

  <!-- Bottom Details Log (Wide Bottom Block) -->
  <g id="card-recent-activity">
    <rect x="100" y="470" width="830" height="100" rx="12" fill="url(#card-grad)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    <text x="120" y="505" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Recent Systems Log</text>
    
    <!-- Table Header -->
    <text x="120" y="528" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#475569">EVENT</text>
    <text x="350" y="528" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#475569">NODE LOCATION</text>
    <text x="580" y="528" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#475569">TIMESTAMP</text>
    <text x="800" y="528" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#475569">STATUS</text>

    <!-- Row 1 -->
    <text x="120" y="555" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#e2e8f0">Corewave v3.2 Engine Sync</text>
    <text x="350" y="555" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">US-EAST (Primary)</text>
    <text x="580" y="555" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">02s ago</text>
    <!-- Status Dot -->
    <circle cx="805" cy="551" r="3" fill="#10b981" />
    <text x="815" y="555" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#10b981">ACTIVE</text>
  </g>
</svg>
