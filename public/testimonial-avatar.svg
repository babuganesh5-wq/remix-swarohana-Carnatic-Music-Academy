<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="48" />
    </clipPath>
  </defs>
  
  <!-- Outer glowing border -->
  <circle cx="50" cy="50" r="49" stroke="url(#avatar-grad)" stroke-width="2" />
  
  <g clip-path="url(#circle-clip)">
    <!-- Background Gradient -->
    <rect width="100" height="100" fill="url(#avatar-grad)" opacity="0.8" />
    
    <!-- Abstract Tech Elements in Background -->
    <circle cx="20" cy="20" r="15" stroke="#ffffff" stroke-width="1" opacity="0.15" />
    <circle cx="80" cy="70" r="25" stroke="#ffffff" stroke-width="1" opacity="0.1" />
    
    <!-- Stylized Professional Portrait Silhouette -->
    <!-- Head & Hair -->
    <circle cx="50" cy="40" r="18" fill="#1e1b4b" />
    <path d="M 32 40 C 32 25, 68 25, 68 40 C 68 44, 62 48, 50 48 C 38 48, 32 44, 32 40 Z" fill="#1e1b4b" />
    
    <!-- Face (simplified chic minimalist illustration) -->
    <circle cx="50" cy="42" r="13" fill="#fed7aa" />
    
    <!-- Hair details / Glasses -->
    <path d="M 35 34 C 40 28, 60 28, 65 34 C 68 38, 62 40, 50 40 C 38 40, 32 38, 35 34 Z" fill="#111827" />
    <rect x="42" y="38" width="6" height="3" rx="1" fill="#111827" opacity="0.9" />
    <rect x="52" y="38" width="6" height="3" rx="1" fill="#111827" opacity="0.9" />
    <path d="M 48 39.5 L 52 39.5" stroke="#111827" stroke-width="1" />
    
    <!-- Neck -->
    <rect x="46" y="52" width="8" height="10" fill="#fdba74" />
    
    <!-- Clothes / Blazer (Sleek dark blue blazer with white shirt) -->
    <path d="M 25 75 C 25 60, 35 58, 42 62 L 50 72 L 58 62 C 65 58, 75 60, 75 75 L 75 100 L 25 100 Z" fill="#0f172a" />
    <path d="M 44 60 L 50 72 L 56 60 Z" fill="#ffffff" />
    <path d="M 49 67 L 50 72 L 51 67 Z" fill="#e2e8f0" />
  </g>
</svg>
