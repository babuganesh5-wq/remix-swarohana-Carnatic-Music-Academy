<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#F5C518" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="60" cy="60" r="54" stroke="url(#gold-grad)" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.4" />
  <circle cx="60" cy="60" r="50" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.2" />

  <!-- The Elegant Veena/Sitar & Soundwave Icon -->
  <g filter="url(#gold-glow)">
    <!-- Base Resonance Pot -->
    <path d="M 60 92 C 78 92, 90 80, 82 58 C 76 38, 64 36, 64 18 C 64 16, 62 14, 60 14 C 58 14, 56 16, 56 18 C 56 36, 44 38, 38 58 C 30 80, 42 92, 60 92 Z" fill="url(#gold-grad)" fill-opacity="0.15" stroke="url(#gold-grad)" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Strings -->
    <line x1="58" y1="22" x2="58" y2="86" stroke="url(#gold-grad)" stroke-width="0.75" opacity="0.8" />
    <line x1="60" y1="20" x2="60" y2="88" stroke="#ffffff" stroke-width="1" opacity="0.9" />
    <line x1="62" y1="22" x2="62" y2="86" stroke="url(#gold-grad)" stroke-width="0.75" opacity="0.8" />
    
    <!-- Bridges and Frets -->
    <path d="M 52 40 L 68 40" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 50 52 L 70 52" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 48 64 L 72 64" stroke="url(#gold-grad)" stroke-width="1.5" />
    <path d="M 48 76 L 72 76" stroke="url(#gold-grad)" stroke-width="2" />
    
    <!-- Decorative Center Core -->
    <circle cx="60" cy="60" r="4" fill="#000000" stroke="url(#gold-grad)" stroke-width="1.5" />
    <circle cx="60" cy="60" r="1.5" fill="#ffffff" />
  </g>

  <!-- Glowing Nodes representing notes -->
  <circle cx="60" cy="14" r="3" fill="#ffffff" filter="url(#gold-glow)" />
  <circle cx="38" cy="58" r="2.5" fill="url(#gold-grad)" filter="url(#gold-glow)" />
  <circle cx="82" cy="58" r="2.5" fill="url(#gold-grad)" filter="url(#gold-glow)" />
</svg>
